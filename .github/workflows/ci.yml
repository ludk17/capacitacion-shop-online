name: CI Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Opcional: si existe algún script de build en el frontend, ejecutaríamos npm run build aquí.
      - name: Build
        run: npm run build --if-present

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build # Asegura que la prueba se ejecute después del build si fuera necesario
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Backend Tests
        run: npm test -w backend
